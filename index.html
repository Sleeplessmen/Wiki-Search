<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wikipedia Search</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container mt-5">
      <h1 class="text-center">Wikipedia Search</h1>

      <div class="search-shell position-relative mt-4">
        <form id="search-form" novalidate>
          <div class="input-group mb-2 gap-3">
            <label for="search-input" class="visually-hidden"
              >Search Wikipedia</label
            >
            <input
              type="text"
              id="search-input"
              class="form-control rounded"
              minlength="3"
              required
              autocomplete="off"
              placeholder="Search Wikipedia..."
            />
            <button
              type="submit"
              id="search-button"
              class="btn btn-primary px-3 rounded"
            >
              Search
            </button>
          </div>

          <div id="search-error" class="text-danger small d-none"></div>
        </form>

        <div
          id="suggestions"
          class="list-group position-absolute w-100 shadow-sm d-none"
        ></div>
      </div>

      <div id="status-message" class="mt-3" aria-live="polite"></div>

      <div id="results-view" class="mt-4"></div>

      <div id="article-view" class="mt-4 d-none">
        <div class="card shadow-sm">
          <div class="card-body">
            <div
              class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3"
            >
              <button
                id="back-button"
                type="button"
                class="btn btn-outline-secondary"
              >
                Back to results
              </button>
              <a
                id="article-external-link"
                href="#"
                target="_blank"
                rel="noopener noreferrer"
                class="btn btn-primary"
              >
                Open on Wikipedia
              </a>
            </div>

            <h2 id="article-title" class="mb-3">Article title</h2>

            <output
              id="article-loading"
              class="d-none my-4"
              aria-live="polite"
              aria-atomic="true"
            >
              <div class="d-flex align-items-center gap-2">
                <div
                  class="spinner-border spinner-border-sm"
                  aria-hidden="true"
                ></div>
                <span>Loading article...</span>
              </div>
            </output>

            <img
              id="article-image"
              class="img-fluid rounded mb-3 d-none article-image"
              alt=""
            />

            <div id="article-content" class="fs-6 lh-lg"></div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
