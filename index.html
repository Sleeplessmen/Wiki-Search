<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wikipedia Search</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #f0f0f0;
      }
      .container {
        max-width: 600px;
      }
      label {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="container mt-5">
      <h1 class="text-center">Wikipedia Search</h1>
      <div class="input-group mb-3 mt-4 gap-3">
        <label for="search-input" class="form-label">Search Wikipedia:</label>
        <input
          type="text"
          id="search-input"
          class="form-control mr-2 rounded"
        />
        <button id="search-button" class="btn btn-primary ml-4 px-3 rounded">
          Search
        </button>
      </div>
    </div>
    <div id="results" class="container mt-4"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      async function onClickSearch() {
        const query = document.querySelector("#search-input").value;
        const response = await fetch(
          `https://en.wikipedia.org/w/api.php?action=query&generator=search&gsrsearch=${query}&gsrlimit=20&prop=pa
geimages|extracts&exintro&explaintext&exlimit=max&format=json&origin=*`,
        );
        const data = await response.json();
        const resultsContainer = document.querySelector("#results");
        resultsContainer.innerHTML = "";
        data.query.pages.forEach(async (page) => {
          const resultDiv = document.createElement("div");
          resultDiv.classList.add("card", "mb-3");
          resultDiv.innerHTML = `
            <div class="card-body">
              <h5 class="card-title">${page.title}</h5>
              <img src="${page.thumbnail ? page.thumbnail.source : "https://via.placeholder.com/150"}" class="card-img-top" alt="${page.title}" />
              <p class="card-text">${page.extract}</p>
              <a href="${page.fullurl}" target="_blank" class="btn btn-primary">Read More</a>
            </div>
          `;
          resultsContainer.appendChild(resultDiv);
        });
      }

      document
        .querySelector("#search-button")
        .addEventListener("click", onClickSearch);

      async function getArticleContent(title) {
        const response = await fetch(
          `https://en.wikipedia.org/w/api.php?action=query&titles=${title}&prop=extracts|pageimages|info&pithumbsize=
400&inprop=url&redirects=&format=json&origin=*`,
        );
        const data = await response.json();
        const pageId = Object.keys(data.query.pages)[0];
        return data.query.pages[pageId].extract;
      }
    </script>
  </body>
</html>
